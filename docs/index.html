<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lou's Research Docs 🛁</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #1a1a2e;
      --sidebar: #16213e;
      --card: #1e2a47;
      --accent: #e2b714;
      --text: #eee;
      --text-dim: #8892a4;
      --border: rgba(255,255,255,0.1);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      width: 300px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--sidebar);
      z-index: 10;
    }

    .header h1 {
      font-size: 18px;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .header p {
      font-size: 12px;
      color: var(--text-dim);
    }

    .file-list {
      flex: 1;
      overflow-y: auto;
    }

    .file-item {
      padding: 12px 20px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }

    .file-item:hover {
      background: rgba(255,255,255,0.05);
    }

    .file-item.active {
      background: var(--card);
      border-left: 3px solid var(--accent);
    }

    .file-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 4px;
      word-break: break-word;
    }

    .file-date {
      font-size: 11px;
      color: var(--text-dim);
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 40px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-dim);
    }

    .empty-state .emoji {
      font-size: 64px;
      margin-bottom: 16px;
    }

    /* Markdown Styles */
    .markdown-body {
      max-width: 800px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .markdown-body h1 {
      font-size: 32px;
      color: var(--accent);
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--border);
    }

    .markdown-body h2 {
      font-size: 24px;
      color: var(--text);
      margin-top: 32px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .markdown-body h3 {
      font-size: 20px;
      color: var(--text);
      margin-top: 24px;
      margin-bottom: 12px;
    }

    .markdown-body h4 {
      font-size: 16px;
      color: var(--text);
      margin-top: 20px;
      margin-bottom: 10px;
    }

    .markdown-body p {
      margin-bottom: 16px;
      color: var(--text);
    }

    .markdown-body a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    .markdown-body a:hover {
      border-bottom-color: var(--accent);
    }

    .markdown-body ul, .markdown-body ol {
      margin-left: 24px;
      margin-bottom: 16px;
    }

    .markdown-body li {
      margin-bottom: 8px;
    }

    .markdown-body code {
      background: rgba(255,255,255,0.1);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
    }

    .markdown-body pre {
      background: rgba(255,255,255,0.05);
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      margin-bottom: 16px;
    }

    .markdown-body pre code {
      background: none;
      padding: 0;
    }

    .markdown-body blockquote {
      border-left: 4px solid var(--accent);
      padding-left: 16px;
      margin: 16px 0;
      color: var(--text-dim);
      font-style: italic;
    }

    .markdown-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }

    .markdown-body table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
    }

    .markdown-body th, .markdown-body td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
    }

    .markdown-body th {
      background: rgba(255,255,255,0.05);
      font-weight: 600;
    }

    .markdown-body strong {
      color: var(--accent);
      font-weight: 600;
    }

    .markdown-body em {
      color: var(--text-dim);
    }

    /* Mobile */
    @media (max-width: 768px) {
      body {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: 40vh;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .content {
        padding: 20px;
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="header">
      <h1>🛁 Lou's Research</h1>
      <p>Click any doc to view</p>
    </div>
    <div class="file-list" id="fileList">
      <div style="padding: 20px; text-align: center; color: var(--text-dim);">
        Loading files...
      </div>
    </div>
  </div>

  <div class="content" id="content">
    <div class="empty-state">
      <div class="emoji">📄</div>
      <p>Select a document to view</p>
    </div>
  </div>

  <script>
    // File metadata (manually maintained for now)
    const files = [
      {
        name: 'brandon-basque-trip-june-2026.md',
        title: 'Basque Country Trip (June 2026)',
        date: '2026-03-12'
      },
      {
        name: 'rosebud-user-storytelling-with-links.md',
        title: 'User Storytelling Examples (with links)',
        date: '2026-03-12'
      },
      {
        name: 'user-storytelling-examples.md',
        title: 'User Storytelling Examples',
        date: '2026-03-12'
      },
      {
        name: 'lay-mindfulness-communities.md',
        title: 'Lay Mindfulness Communities',
        date: '2026-02-27'
      },
      {
        name: 'basque-country-guide.md',
        title: 'Basque Country Guide',
        date: '2026-02-22'
      },
      {
        name: 'intentional-communities-visitor-guide.md',
        title: 'Intentional Communities Guide',
        date: '2026-02-08'
      },
      {
        name: 'brandon-summer-trip-research.md',
        title: 'Summer Trip Research',
        date: '2026-02-08'
      },
      {
        name: 'TODO.md',
        title: 'Todo List',
        date: '2026-02-11'
      }
    ];

    let currentFile = null;

    // Render file list
    function renderFileList() {
      const fileList = document.getElementById('fileList');
      fileList.innerHTML = files.map((file, index) => `
        <div class="file-item" data-index="${index}" onclick="loadFile(${index})">
          <div class="file-name">${file.title}</div>
          <div class="file-date">${formatDate(file.date)}</div>
        </div>
      `).join('');
    }

    // Format date
    function formatDate(dateStr) {
      const date = new Date(dateStr);
      const now = new Date();
      const diffDays = Math.floor((now - date) / (1000 * 60 * 60 * 24));
      
      if (diffDays === 0) return 'Today';
      if (diffDays === 1) return 'Yesterday';
      if (diffDays < 7) return `${diffDays} days ago`;
      
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    // Load file
    async function loadFile(index) {
      const file = files[index];
      
      // Update active state
      document.querySelectorAll('.file-item').forEach(item => item.classList.remove('active'));
      document.querySelector(`[data-index="${index}"]`).classList.add('active');

      try {
        const response = await fetch(`/workspace/${file.name}`);
        if (!response.ok) throw new Error('File not found');
        
        const markdown = await response.text();
        const html = marked.parse(markdown, {
          breaks: true,
          gfm: true
        });

        document.getElementById('content').innerHTML = `
          <div class="markdown-body">
            ${html}
          </div>
        `;

        currentFile = file;
      } catch (error) {
        document.getElementById('content').innerHTML = `
          <div class="empty-state">
            <div class="emoji">⚠️</div>
            <p>Could not load file: ${file.name}</p>
            <p style="font-size: 12px; margin-top: 8px;">Error: ${error.message}</p>
          </div>
        `;
      }
    }

    // Initialize
    renderFileList();

    // Load first file by default
    if (files.length > 0) {
      loadFile(0);
    }
  </script>
</body>
</html>
